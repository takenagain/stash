name: stash_secure_storage_example
description: Demonstrates how to use the stash_secure_storage plugin
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.32.5'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  stash: ^5.2.0
  stash_secure_storage:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
